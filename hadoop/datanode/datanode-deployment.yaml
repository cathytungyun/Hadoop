apiVersion: apps/v1
kind: Deployment
metadata:
 name: datanode
spec:
 strategy:
   rollingUpdate:
     maxSurge: 1
     maxUnavailable: 1
   type: RollingUpdate
 replicas: 2
 selector:
   matchLabels:
     app: datanode
 template:
   metadata:
     labels:
       app: datanode
   spec:
     containers:
       - name: datanode
         image: raywted75/hadoop-datanode
         ports:
           - containerPort: 9864